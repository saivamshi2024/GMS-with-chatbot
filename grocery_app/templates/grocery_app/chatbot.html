<div id="chat-icon">
    💬
</div>

<div id="chat-window">

    <div id="chat-header">
        <span>🛒 Grocery Assistant</span>
        <button id="close-chat">&times;</button>
    </div>

    <div id="chat-body">

        <div class="bot-message">
            👋 Hello! Ask me anything about our grocery store.
        </div>

    </div>

    <div id="chat-footer">

        <input
            type="text"
            id="user-input"
            placeholder="Type your question..."
        >

        <button id="send-btn">
            Send
        </button>

    </div>

</div>
